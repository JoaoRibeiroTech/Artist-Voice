<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Artistic Voice</title>
    
    <!--Importação da imagem para aparecer no title-->
    <link rel="shortcut icon" type="image/ico" href="static/img/logo.ico">
    <!--Importação do CSS-->
    <link rel="stylesheet" href="static/css/style.css">
    <!--Importação do Js-->
    <script src="static/js/main.js"></script>

</head>
<body>
    <script>
        //alert("Seja bem-vindo ao Artist Voice")
    </script>
    
    <div id="header">
        <img src="static/img/artistic_voice_logo.ico" id="imgHeader" >
        <button class="btn-home" onclick="sobre()">
            Home
        </button>

        <button class="btn-categoria" onclick="categoria()">
            Categoria
        </button>

        <button class="btn-topart" onclick="topart">
            Top Artist
        </button>

        <button class="btn-login" onclick="login()">
           👤 Sign in
        </button>

    </div>

    <div id="container-imagens">
        <img src="static/img/background.ico" id="backImg" alt="Imagem de fundo">

        <div id="title">
            <h1>Descubra os Cantores do Momento</h1>
            Explore, avalie e conecte-se com os artistas talentosos ao redor do mundo
        </div>

        <div id="card">
            <img src="static/img/ZeNeto Cristiano.jpeg" id="zeneto">

            <div class="info">
                <h2>Zé Neto e Cristiano</h2>

                <p class="categoria">
                    Sertanejo
                </p>

                <p class="descricao">
                    Dupla sertaneja especializada em fazer pessoas sofrerem 💔
                </p>

                <button>
                    View Portfolio
                </button>
            </div>
        </div>
    </div>

    <div class="end">
        <img src="static/img/artistic_voice_logo.ico" class="imgend">
    </div>
</body>
</html>
